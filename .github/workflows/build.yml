              final ok = await _data.soumettreDocuments(bureauId: widget.bureau.id, ordreMission: om, ordonnance: ord);
              if (!mounted) return;
              if (ok) {
                ScaffoldMessenger.of(context).showSnackBar(const SnackBar(content: Text('Documents soumis au superviseur !'), backgroundColor: Colors.green));
