      - name: Create app icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-hdpi android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi android/app/src/main/res/mipmap-xxhdpi android/app/src/main/res/mipmap-xxxhdpi
          python3 -c "
          import struct, zlib, base64
          def create_png(size):
              w = h = size
              raw = b'\x00' + bytes([27, 94, 32] * w) * h
              def chunk(t, d): c = zlib.crc32(t+d)&0xffffffff; return struct.pack('>I',len(d))+t+d+struct.pack('>I',c)
              return b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))+chunk(b'IDAT',zlib.compress(raw))+chunk(b'IEND',b'')
          for size,name in [(48,'hdpi'),(36,'mdpi'),(64,'xhdpi'),(96,'xxhdpi'),(128,'xxxhdpi')]:
              with open(f'android/app/src/main/res/mipmap-{name}/ic_launcher.png','wb') as f: f.write(create_png(size))
          print('Icons created')
          " 
          

