            Future<void> _prendrePhoto(String type) async {
              try {
                final picker = ImagePicker();
                final picked = await picker.pickImage(source: ImageSource.camera, imageQuality: 70, maxWidth: 1200);
                if (picked == null) return;
                final bytes = await picked.readAsBytes();
                if (!mounted) return;
                ScaffoldMessenger.of(context).showSnackBar(const SnackBar(content: Text('Upload en cours...')));
                final url = await _data.uploadDocumentPhoto(widget.bureau.id, type, bytes);
                if (url != null) {
                  await _data.saveDocumentPhoto(widget.bureau.id, type, url);
                  if (!mounted) return;
                  ScaffoldMessenger.of(context).showSnackBar(SnackBar(content: Text('Photo $type enregistree !'), backgroundColor: Colors.green));
                  _charger();
                }
