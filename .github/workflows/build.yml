            Widget _tabPv() {
              if (_pv?.statut == 'valide') return Center(child: Column(mainAxisAlignment: MainAxisAlignment.center, children: [
                const Icon(Icons.verified, color: Colors.green, size: 64),
                const SizedBox(height: 12),
                const Text('PV Valide [OK]', style: TextStyle(fontSize: 20, fontWeight: FontWeight.bold, color: Colors.green)),
