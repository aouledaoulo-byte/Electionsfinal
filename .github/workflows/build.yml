                  child: Text('[ERR] Rejete: ${_pv!.noteRejet ?? ""}', style: const TextStyle(color: Colors.red)))),
                Card(child: Padding(padding: const EdgeInsets.all(16), child: Column(children: [
                  const Text('PV Final', style: TextStyle(fontWeight: FontWeight.bold, fontSize: 16)),
                  const SizedBox(height: 12),
                  _champPv('Votants', cV), _champPv('Nuls', cN),
                  _champPv('Voix Candidat A', cA), _champPv('Voix Candidat B', cB),
                  const SizedBox(height: 12),
                  ElevatedButton.icon(
                    style: ElevatedButton.styleFrom(backgroundColor: const Color(0xFF1B5E20), foregroundColor: Colors.white, minimumSize: const Size(double.infinity, 48)),
                    onPressed: () async {
                      final v = int.tryParse(cV.text), n = int.tryParse(cN.text), a = int.tryParse(cA.text), b = int.tryParse(cB.text);
                      if (v == null || n == null || a == null || b == null) { ScaffoldMessenger.of(context).showSnackBar(const SnackBar(content: Text('Remplissez tous les champs'), backgroundColor: Colors.red)); return; }
                      if (v != n + a + b) { ScaffoldMessenger.of(context).showSnackBar(SnackBar(content: Text('Erreur: $v != $n + $a + $b'), backgroundColor: Colors.red)); return; }
                      final ok = await _data.submitPv(bureauId: widget.bureau.id, votants: v, nuls: n, voixA: a, voixB: b, saisiPar: widget.agentId);
