name: Build Election APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Flutter project
        run: |
          flutter create --org com.election --project-name election /tmp/myapp
          cp -r /tmp/myapp/android .
          cp -r /tmp/myapp/test . 2>/dev/null || true

      - name: Fix Kotlin version in settings.gradle
        run: |
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.10"/' android/settings.gradle

      - name: Create pubspec.yaml
        run: |
          cat > pubspec.yaml << 'PUBSPEC'
          name: election
          description: Election 2026
          version: 1.0.0+1
          environment:
            sdk: ">=3.0.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            http: ^1.1.0
            cupertino_icons: ^1.0.6
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          flutter:
            uses-material-design: true
          PUBSPEC

      - name: Create lib directories
        run: |
          mkdir -p lib/utils lib/models lib/services
          mkdir -p lib/screens/agent lib/screens/superviseur

      - name: Write Dart files
        run: |
          echo "" | base64 -d > lib/main.dart
          echo "" | base64 -d > lib/utils/constants.dart
          echo "" | base64 -d > lib/models/models.dart
          echo "" | base64 -d > lib/services/services.dart
          echo "" | base64 -d > lib/screens/login_screen.dart
          echo "" | base64 -d > lib/screens/agent/agent_home.dart
          echo "" | base64 -d > lib/screens/agent/releve_screen.dart
          echo "" | base64 -d > lib/screens/agent/pv_final_screen.dart
          echo "" | base64 -d > lib/screens/agent/documents_screen.dart
          echo "" | base64 -d > lib/screens/agent/messagerie_agent_screen.dart
          echo "" | base64 -d > lib/screens/superviseur/superviseur_home.dart
          echo "" | base64 -d > lib/screens/superviseur/dashboard_screen.dart
          echo "" | base64 -d > lib/screens/superviseur/validation_screen.dart
          echo "" | base64 -d > lib/screens/superviseur/inscrits_screen.dart
          echo "" | base64 -d > lib/screens/superviseur/messagerie_sup_screen.dart

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: election-apk
          path: build/app/outputs/flutter-apk/app-release.apk
