                  Icon(Icons.how_to_vote, size: 80, color: Colors.white),
                  SizedBox(height: 16),
                  Text('ELECTION', style: TextStyle(fontSize: 32, fontWeight: FontWeight.bold, color: Colors.white, letterSpacing: 4)),
                  SizedBox(height: 40),
                  CircularProgressIndicator(color: Colors.white)])));
            }
          }
