name: Build Election APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create pubspec.yaml
        run: |
          cat > pubspec.yaml << 'PUBEOF'
          name: election
          description: Application Elections 2026
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
            flutter: '>=3.24.0'
          dependencies:
            flutter:
              sdk: flutter
            http: ^1.2.0
          dev_dependencies:
            flutter_test:
              sdk: flutter
          flutter:
            uses-material-design: true
          PUBEOF

      - name: Fix Kotlin version
        run: |
          if [ -f android/settings.gradle ]; then
            sed -i 's/kotlin("android") version "[^"]*"/kotlin("android") version "1.9.10"/' android/settings.gradle
            sed -i "s/kotlin("android") version '[^']*'/kotlin("android") version '1.9.10'/" android/settings.gradle
          fi

      - name: Create directory structure
