name: Build Election APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Create Flutter project structure
        run: |
          flutter create --org com.election --project-name election /tmp/election_new
          cp -r /tmp/election_new/android ./android
          rm -rf lib/
          cp -r /tmp/election_new/lib ./lib
      - name: Create pubspec.yaml
        run: |
          echo '' | base64 -d > pubspec.yaml
      - name: Create directory structure
        run: |
          mkdir -p lib/utils lib/models lib/services
          mkdir -p lib/screens/agent lib/screens/superviseur


      - name: Create lib/main.dart
        run: |
          echo '' | base64 -d > lib/main.dart


      - name: Create lib/utils/constants.dart
        run: |
          echo '' | base64 -d > lib/utils/constants.dart


      - name: Create lib/models/models.dart
        run: |
          echo '' | base64 -d > lib/models/models.dart


      - name: Create lib/services/services.dart
        run: |
          echo '' | base64 -d > lib/services/services.dart


      - name: Create lib/screens/login_screen.dart
        run: |
          echo '' | base64 -d > lib/screens/login_screen.dart


      - name: Create lib/screens/agent/agent_home.dart
        run: |
          echo '' | base64 -d > lib/screens/agent/agent_home.dart


      - name: Create lib/screens/agent/agent_bureau_detail.dart
        run: |
          echo '' | base64 -d > lib/screens/agent/agent_bureau_detail.dart


      - name: Create lib/screens/agent/releve_screen.dart
        run: |
          echo '' | base64 -d > lib/screens/agent/releve_screen.dart


      - name: Create lib/screens/agent/pv_screen.dart
        run: |
          echo '' | base64 -d > lib/screens/agent/pv_screen.dart


      - name: Create lib/screens/agent/documents_screen.dart
        run: |
          echo '' | base64 -d > lib/screens/agent/documents_screen.dart


      - name: Create lib/screens/agent/messagerie_screen.dart
        run: |
          echo '' | base64 -d > lib/screens/agent/messagerie_screen.dart


      - name: Create lib/screens/superviseur/superviseur_home.dart
        run: |
          echo '' | base64 -d > lib/screens/superviseur/superviseur_home.dart


      - name: Create lib/screens/superviseur/dashboard_live.dart
        run: |
          echo '' | base64 -d > lib/screens/superviseur/dashboard_live.dart


      - name: Create lib/screens/superviseur/dashboard_national.dart
        run: |
          echo '' | base64 -d > lib/screens/superviseur/dashboard_national.dart


      - name: Create lib/screens/superviseur/validation_screen.dart
        run: |
          echo '' | base64 -d > lib/screens/superviseur/validation_screen.dart


      - name: Create lib/screens/superviseur/agents_screen.dart
        run: |
          echo '' | base64 -d > lib/screens/superviseur/agents_screen.dart


      - name: Create lib/screens/superviseur/anomalies_screen.dart
        run: |
          echo '' | base64 -d > lib/screens/superviseur/anomalies_screen.dart


      - name: Create lib/screens/superviseur/inscrits_screen.dart
        run: |
          echo '' | base64 -d > lib/screens/superviseur/inscrits_screen.dart


      - name: Create lib/screens/superviseur/saisie_manuelle_screen.dart
        run: |
          echo '' | base64 -d > lib/screens/superviseur/saisie_manuelle_screen.dart


      - name: flutter pub get
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: election-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
