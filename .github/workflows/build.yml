                  Image.network(url, fit: BoxFit.contain),
                ]),
              ));
            }

            Widget _kpi(String l, String v, {bool bold = false}) => Column(children: [
              Text(v, style: TextStyle(fontSize: bold ? 22 : 18, fontWeight: FontWeight.bold, color: const Color(0xFF1B5E20))),
              Text(l, style: const TextStyle(fontSize: 10, color: Colors.grey))]);

            Widget _champPv(String label, TextEditingController ctrl) => Padding(
              padding: const EdgeInsets.only(bottom: 10),
              child: TextField(controller: ctrl, keyboardType: TextInputType.number,
                decoration: InputDecoration(labelText: label, border: OutlineInputBorder(borderRadius: BorderRadius.circular(10)))));
