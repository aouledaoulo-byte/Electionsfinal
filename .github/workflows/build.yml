name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create full Flutter project from scratch
        run: |
          mkdir -p lib/screens/agent lib/screens/superviseur lib/models lib/services lib/utils
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/kotlin/com/ynet/election
          mkdir -p assets/images

          # ── constants.dart ──────────────────────────────────
          cat > lib/utils/constants.dart << 'EOF'
          class AppConstants {
            static const String supabaseUrl = 'https://ktkjtcjmsuugogyejtwh.supabase.co';
            static const String supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0a2p0Y2ptc3V1Z29neWVqdHdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTY3OTYsImV4cCI6MjA4ODY3Mjc5Nn0.Hu6cWispUu13a68lH8MzzAiVAePbZjqREPfFVfzed-8';
            static const int heureOuverture = 7;
            static const int heureFermeture = 18;
            static const int colorVert = 0xFF1B5E20;
            static const double seuilNulsWarning = 0.15;
          }
          class AppRoles {
            static const String agent = 'agent';
            static const String superviseurRegional = 'superviseur_regional';
            static const String superviseurNational = 'superviseur_national';
          }
          class PvStatut {
            static const String soumis = 'soumis';
            static const String valide = 'valide';
            static const String rejete = 'rejete';
          }
          EOF

          # ── models.dart ──────────────────────────────────────
          cat > lib/models/models.dart << 'EOF'
          class Bureau {
            final String id, code, nom, region, commune, centre;
            final int inscrits, ordreMission, ordonnance;
            final String? agentId;
            Bureau({required this.id, required this.code, required this.nom,
              required this.region, required this.commune, required this.centre,
              required this.inscrits, required this.ordreMission, required this.ordonnance,
              this.agentId});
            int get inscritsCorriges => inscrits + ordreMission + ordonnance;
            factory Bureau.fromJson(Map<String, dynamic> j) => Bureau(
              id: j['id'], code: j['code'], nom: j['nom'],
              region: j['region'], commune: j['commune'], centre: j['centre'],
              inscrits: j['inscrits'] ?? 0, ordreMission: j['ordre_mission'] ?? 0,
              ordonnance: j['ordonnance'] ?? 0, agentId: j['agent_id']);
          }
          class TurnoutSnapshot {
            final String? id, bureauId, saisiPar, validesPar, noteRejet;
            final int heure, votants;
            final String statut;
            final bool offline;
            TurnoutSnapshot({this.id, required this.bureauId, required this.heure,
              required this.votants, required this.statut, this.saisiPar,
              this.validesPar, this.noteRejet, this.offline = false});
            factory TurnoutSnapshot.fromJson(Map<String, dynamic> j) => TurnoutSnapshot(
              id: j['id'], bureauId: j['bureau_id'], heure: j['heure'],
              votants: j['votants'], statut: j['statut'] ?? 'soumis',
              saisiPar: j['saisi_par'], noteRejet: j['note_rejet'],
              offline: j['offline'] ?? false);
            Map<String, dynamic> toJson() => {'bureau_id': bureauId, 'heure': heure,
              'votants': votants, 'statut': statut, 'saisi_par': saisiPar};
          }
          class PvResult {
            final String? id, bureauId, saisiPar, validesPar, noteRejet, photoUrl;
            final int votants, nuls, voixA, voixB;
            final String statut;
            PvResult({this.id, required this.bureauId, required this.votants,
              required this.nuls, required this.voixA, required this.voixB,
              required this.statut, this.saisiPar, this.validesPar,
              this.noteRejet, this.photoUrl});
            int get exprimes => voixA + voixB;
            double get pctA => exprimes > 0 ? voixA / exprimes * 100 : 0;
            double get pctB => exprimes > 0 ? voixB / exprimes * 100 : 0;
            double get pctNuls => votants > 0 ? nuls / votants * 100 : 0;
            factory PvResult.fromJson(Map<String, dynamic> j) => PvResult(
              id: j['id'], bureauId: j['bureau_id'], votants: j['votants'] ?? 0,
              nuls: j['nuls'] ?? 0, voixA: j['voix_a'] ?? 0, voixB: j['voix_b'] ?? 0,
              statut: j['statut'] ?? 'soumis', saisiPar: j['saisi_par'],
              noteRejet: j['note_rejet'], photoUrl: j['photo_url']);
            Map<String, dynamic> toJson() => {'bureau_id': bureauId, 'votants': votants,
              'nuls': nuls, 'voix_a': voixA, 'voix_b': voixB, 'statut': statut,
              'saisi_par': saisiPar, 'photo_url': photoUrl};
          }
          class Utilisateur {
            final String id, codeUnique, nom, role;
            final String? prenom, region, authId;
            Utilisateur({required this.id, required this.codeUnique,
              required this.nom, required this.role, this.prenom, this.region, this.authId});
            factory Utilisateur.fromJson(Map<String, dynamic> j) => Utilisateur(
              id: j['id'], codeUnique: j['code_unique'], nom: j['nom'],
              role: j['role'], prenom: j['prenom'], region: j['region'], authId: j['auth_id']);
          }
          EOF

          # ── services.dart ─────────────────────────────────────
          cat > lib/services/services.dart << 'EOF'
          import 'package:supabase_flutter/supabase_flutter.dart';
          import 'package:shared_preferences/shared_preferences.dart';
          import '../models/models.dart';

          final _sb = Supabase.instance.client;

          class AuthService {
            Future<Utilisateur?> loginWithCode(String codeUnique) async {
              try {
                final res = await _sb.from('utilisateurs').select()
                  .eq('code_unique', codeUnique).eq('actif', true).single();
                final user = Utilisateur.fromJson(res);
                if (_sb.auth.currentSession == null) await _sb.auth.signInAnonymously();
                final prefs = await SharedPreferences.getInstance();
                await prefs.setString('user_id', user.id);
                await prefs.setString('user_role', user.role);
                await prefs.setString('user_nom', user.nom);
                if (user.region != null) await prefs.setString('user_region', user.region!);
                return user;
              } catch (e) { return null; }
            }
            Future<String?> getUserRole() async {
              final p = await SharedPreferences.getInstance();
              return p.getString('user_role');
            }
            Future<String?> getUserId() async {
              final p = await SharedPreferences.getInstance();
              return p.getString('user_id');
            }
            Future<String?> getUserNom() async {
              final p = await SharedPreferences.getInstance();
              return p.getString('user_nom');
            }
            Future<void> logout() async {
              await _sb.auth.signOut();
              final p = await SharedPreferences.getInstance();
              await p.clear();
            }
          }

          class DataService {
            Future<List<Bureau>> getBureauxAgent(String agentId) async {
              final res = await _sb.from('bureaux').select().eq('agent_id', agentId).eq('actif', true);
              return (res as List).map((j) => Bureau.fromJson(j)).toList();
            }
            Future<List<Bureau>> getBureauxRegion(String region) async {
              final res = await _sb.from('bureaux').select().eq('region', region).eq('actif', true);
              return (res as List).map((j) => Bureau.fromJson(j)).toList();
            }
            Future<List<Bureau>> getAllBureaux() async {
              final res = await _sb.from('bureaux').select().eq('actif', true).order('region');
              return (res as List).map((j) => Bureau.fromJson(j)).toList();
            }
            Future<List<TurnoutSnapshot>> getSnapshotsBureau(String bureauId) async {
              final res = await _sb.from('turnout_snapshots').select()
                .eq('bureau_id', bureauId).order('heure');
              return (res as List).map((j) => TurnoutSnapshot.fromJson(j)).toList();
            }
            Future<bool> submitSnapshot({required String bureauId, required int heure,
              required int votants, required String saisiPar}) async {
              try {
                await _sb.from('turnout_snapshots').upsert({'bureau_id': bureauId,
                  'heure': heure, 'votants': votants, 'saisi_par': saisiPar,
                  'statut': 'soumis'}, onConflict: 'bureau_id,heure');
                return true;
              } catch (e) { return false; }
            }
            Future<PvResult?> getPvBureau(String bureauId) async {
              try {
                final res = await _sb.from('pv_results').select().eq('bureau_id', bureauId).single();
                return PvResult.fromJson(res);
              } catch (_) { return null; }
            }
            Future<List<PvResult>> getAllPv() async {
              final res = await _sb.from('pv_results').select();
              return (res as List).map((j) => PvResult.fromJson(j)).toList();
            }
            Future<bool> submitPv({required String bureauId, required int votants,
              required int nuls, required int voixA, required int voixB,
              required String saisiPar, String? photoUrl}) async {
              try {
                await _sb.from('pv_results').upsert({'bureau_id': bureauId,
                  'votants': votants, 'nuls': nuls, 'voix_a': voixA, 'voix_b': voixB,
                  'saisi_par': saisiPar, 'photo_url': photoUrl, 'statut': 'soumis'},
                  onConflict: 'bureau_id');
                return true;
              } catch (e) { return false; }
            }
            Future<bool> validerPv(String pvId, String validesPar) async {
              try {
                await _sb.from('pv_results').update({'statut': 'valide', 'valide_par': validesPar}).eq('id', pvId);
                return true;
              } catch (e) { return false; }
            }
            Future<bool> rejeterPv(String pvId, String noteRejet, String validesPar) async {
              try {
                await _sb.from('pv_results').update({'statut': 'rejete',
                  'note_rejet': noteRejet, 'valide_par': validesPar}).eq('id', pvId);
                return true;
              } catch (e) { return false; }
            }
            Future<Map<String, dynamic>?> getKpiNational() async {
              try { return await _sb.from('kpi_pv_national').select().single(); }
              catch (_) { return null; }
            }
            Future<List<Map<String, dynamic>>> getKpiByRegion() async {
              final res = await _sb.from('kpi_pv_by_region').select().order('region');
              return List<Map<String, dynamic>>.from(res);
            }
            Future<List<Map<String, dynamic>>> getLiveCoverage() async {
              final res = await _sb.from('kpi_live_coverage_by_hour').select().order('heure');
              return List<Map<String, dynamic>>.from(res);
            }
            Future<List<Map<String, dynamic>>> getAnomalies() async {
              final res = await _sb.from('v_audit_pv_anomalies').select().neq('niveau_anomalie', 'OK');
              return List<Map<String, dynamic>>.from(res);
            }
            Future<String?> uploadPhotoPv(String bureauId, List<int> bytes) async {
              try {
                final path = 'pv/$bureauId/${DateTime.now().millisecondsSinceEpoch}.jpg';
                await _sb.storage.from('pv-photos').uploadBinary(path, Uint8List.fromList(bytes));
                return _sb.storage.from('pv-photos').getPublicUrl(path);
              } catch (_) { return null; }
            }
          }
          EOF

          # Add Uint8List import to services.dart
          sed -i '1s/^/import "dart:typed_data";\n/' lib/services/services.dart

      - name: Create screen files
        run: |
          # ── login_screen.dart ────────────────────────────────
          cat > lib/screens/login_screen.dart << 'EOF'
          import 'package:flutter/material.dart';
          import '../services/services.dart';
          import '../utils/constants.dart';
          import 'agent/agent_home.dart';
          import 'superviseur/superviseur_home.dart';

          class LoginScreen extends StatefulWidget {
            const LoginScreen({super.key});
            @override State<LoginScreen> createState() => _LoginScreenState();
          }
          class _LoginScreenState extends State<LoginScreen> {
            final _codeCtrl = TextEditingController();
            bool _loading = false;
            String? _erreur;
            Future<void> _login() async {
              final code = _codeCtrl.text.trim().toUpperCase();
              if (code.isEmpty) { setState(() => _erreur = 'Veuillez saisir votre code'); return; }
              setState(() { _loading = true; _erreur = null; });
              final user = await AuthService().loginWithCode(code);
              if (!mounted) return;
              setState(() => _loading = false);
              if (user == null) { setState(() => _erreur = 'Code invalide ou compte inactif'); return; }
              if (user.role == AppRoles.agent) {
                Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => const AgentHome()));
              } else {
                Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => const SuperviseurHome()));
              }
            }
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: const Color(0xFF1B5E20),
                body: SafeArea(child: Center(child: SingleChildScrollView(
                  padding: const EdgeInsets.all(28),
                  child: Column(mainAxisAlignment: MainAxisAlignment.center, children: [
                    const Icon(Icons.how_to_vote, size: 80, color: Colors.white),
                    const SizedBox(height: 16),
                    const Text('ELECTION', style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold, color: Colors.white, letterSpacing: 4)),
                    const SizedBox(height: 40),
                    Card(child: Padding(padding: const EdgeInsets.all(24), child: Column(children: [
                      const Text('Connexion', style: TextStyle(fontSize: 20, fontWeight: FontWeight.bold)),
                      const SizedBox(height: 20),
                      TextField(controller: _codeCtrl,
                        textCapitalization: TextCapitalization.characters,
                        decoration: InputDecoration(labelText: 'Code unique',
                          hintText: 'Ex: AGENT-001', prefixIcon: const Icon(Icons.vpn_key),
                          border: OutlineInputBorder(borderRadius: BorderRadius.circular(10)),
                          errorText: _erreur)),
                      const SizedBox(height: 20),
                      _loading ? const CircularProgressIndicator()
                        : ElevatedButton.icon(onPressed: _login,
                            icon: const Icon(Icons.login),
                            label: const Text('Se connecter', style: TextStyle(fontSize: 16, fontWeight: FontWeight.bold)),
                            style: ElevatedButton.styleFrom(backgroundColor: const Color(0xFF1B5E20),
                              foregroundColor: Colors.white, minimumSize: const Size(double.infinity, 52))),
                    ]))),
                  ]),
                ))),
              );
            }
          }
          EOF

          # ── agent_home.dart ──────────────────────────────────
          cat > lib/screens/agent/agent_home.dart << 'EOF'
          import 'package:flutter/material.dart';
          import '../../services/services.dart';
          import '../../models/models.dart';
          import '../login_screen.dart';
          import 'agent_bureau_detail.dart';

          class AgentHome extends StatefulWidget {
            const AgentHome({super.key});
            @override State<AgentHome> createState() => _AgentHomeState();
          }
          class _AgentHomeState extends State<AgentHome> {
            final _data = DataService();
            List<Bureau> _bureaux = [];
            bool _loading = true;
            String _nomAgent = '', _agentId = '';

            @override void initState() { super.initState(); _init(); }

            Future<void> _init() async {
              _nomAgent = await AuthService().getUserNom() ?? '';
              _agentId = await AuthService().getUserId() ?? '';
              await _charger();
            }
            Future<void> _charger() async {
              setState(() => _loading = true);
              try {
                final b = await _data.getBureauxAgent(_agentId);
                setState(() { _bureaux = b; _loading = false; });
              } catch (_) { setState(() => _loading = false); }
            }
            Future<void> _logout() async {
              await AuthService().logout();
              if (!mounted) return;
              Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => const LoginScreen()));
            }
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text('Mes Bureaux'),
                  backgroundColor: const Color(0xFF1B5E20), foregroundColor: Colors.white,
                  actions: [IconButton(icon: const Icon(Icons.logout), onPressed: _logout)]),
                body: Column(children: [
                  Container(color: const Color(0xFF1B5E20), padding: const EdgeInsets.fromLTRB(16,0,16,16),
                    child: Row(children: [
                      const CircleAvatar(backgroundColor: Colors.white24, child: Icon(Icons.person, color: Colors.white)),
                      const SizedBox(width: 12),
                      Column(crossAxisAlignment: CrossAxisAlignment.start, children: [
                        Text('Agent terrain', style: TextStyle(color: Colors.white.withOpacity(0.7), fontSize: 12)),
                        Text(_nomAgent, style: const TextStyle(color: Colors.white, fontWeight: FontWeight.bold, fontSize: 16)),
                      ]),
                    ])),
                  Expanded(child: _loading ? const Center(child: CircularProgressIndicator())
                    : RefreshIndicator(onRefresh: _charger,
                        child: ListView.builder(padding: const EdgeInsets.all(12),
                          itemCount: _bureaux.length,
                          itemBuilder: (_, i) {
                            final b = _bureaux[i];
                            return Card(margin: const EdgeInsets.only(bottom: 10),
                              child: ListTile(
                                leading: const Icon(Icons.ballot, color: Color(0xFF1B5E20)),
                                title: Text(b.nom, style: const TextStyle(fontWeight: FontWeight.bold)),
                                subtitle: Text('${b.region} · ${b.commune} · Inscrits: ${b.inscritsCorriges}'),
                                trailing: const Icon(Icons.chevron_right),
                                onTap: () => Navigator.push(context, MaterialPageRoute(
                                  builder: (_) => AgentBureauDetail(bureau: b, agentId: _agentId)))));
                          }))),
                ]));
            }
          }
          EOF

          # ── agent_bureau_detail.dart (simplified) ────────────
          cat > lib/screens/agent/agent_bureau_detail.dart << 'EOF'
          import 'package:flutter/material.dart';
          import '../../models/models.dart';
          import '../../services/services.dart';
          import '../../utils/constants.dart';

          class AgentBureauDetail extends StatefulWidget {
            final Bureau bureau;
            final String agentId;
            const AgentBureauDetail({super.key, required this.bureau, required this.agentId});
            @override State<AgentBureauDetail> createState() => _AgentBureauDetailState();
          }
          class _AgentBureauDetailState extends State<AgentBureauDetail> with SingleTickerProviderStateMixin {
            late TabController _tabs;
            final _data = DataService();
            List<TurnoutSnapshot> _snapshots = [];
            PvResult? _pv;
            bool _loading = true;

            @override void initState() { super.initState(); _tabs = TabController(length: 2, vsync: this); _charger(); }

            Future<void> _charger() async {
              setState(() => _loading = true);
              final s = await _data.getSnapshotsBureau(widget.bureau.id);
              final p = await _data.getPvBureau(widget.bureau.id);
              setState(() { _snapshots = s; _pv = p; _loading = false; });
            }

            int get _heureActuelle => DateTime.now().hour.clamp(AppConstants.heureOuverture, AppConstants.heureFermeture);
            bool get _releveDejaSaisi => _snapshots.any((s) => s.heure == _heureActuelle);

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text(widget.bureau.nom),
                  backgroundColor: const Color(0xFF1B5E20), foregroundColor: Colors.white,
                  bottom: TabBar(controller: _tabs, labelColor: Colors.white, unselectedLabelColor: Colors.white60,
                    indicatorColor: Colors.white,
                    tabs: const [Tab(icon: Icon(Icons.access_time), text: 'Relevé LIVE'),
                      Tab(icon: Icon(Icons.assignment), text: 'PV Final')])),
                body: _loading ? const Center(child: CircularProgressIndicator())
                  : TabBarView(controller: _tabs, children: [_tabLive(), _tabPv()]));
            }

            Widget _tabLive() {
              final cVotants = TextEditingController();
              return SingleChildScrollView(padding: const EdgeInsets.all(16), child: Column(children: [
                Card(color: const Color(0xFFE8F5E9), child: Padding(padding: const EdgeInsets.all(14),
                  child: Row(mainAxisAlignment: MainAxisAlignment.spaceAround, children: [
                    _kpi('Inscrits', widget.bureau.inscrits.toString()),
                    _kpi('Corrigés', widget.bureau.inscritsCorriges.toString(), bold: true),
                  ]))),
                const SizedBox(height: 12),
                if (!_releveDejaSaisi) Card(child: Padding(padding: const EdgeInsets.all(16), child: Column(children: [
                  Text('Relevé ${_heureActuelle}h', style: const TextStyle(fontWeight: FontWeight.bold, fontSize: 16)),
                  const SizedBox(height: 12),
                  TextField(controller: cVotants, keyboardType: TextInputType.number,
                    decoration: InputDecoration(labelText: 'Nombre de votants',
                      suffixText: '/ ${widget.bureau.inscritsCorriges}',
                      border: OutlineInputBorder(borderRadius: BorderRadius.circular(10)))),
                  const SizedBox(height: 12),
                  ElevatedButton.icon(
                    style: ElevatedButton.styleFrom(backgroundColor: const Color(0xFF1B5E20), foregroundColor: Colors.white, minimumSize: const Size(double.infinity, 48)),
                    onPressed: () async {
                      final v = int.tryParse(cVotants.text);
                      if (v == null) { ScaffoldMessenger.of(context).showSnackBar(const SnackBar(content: Text('Saisissez un nombre valide'), backgroundColor: Colors.red)); return; }
                      if (v > widget.bureau.inscritsCorriges) { ScaffoldMessenger.of(context).showSnackBar(const SnackBar(content: Text('Votants > Inscrits corrigés!'), backgroundColor: Colors.red)); return; }
                      final ok = await _data.submitSnapshot(bureauId: widget.bureau.id, heure: _heureActuelle, votants: v, saisiPar: widget.agentId);
                      if (!mounted) return;
                      if (ok) { ScaffoldMessenger.of(context).showSnackBar(SnackBar(content: Text('Relevé ${_heureActuelle}h transmis!'), backgroundColor: Colors.green)); _charger(); }
                    },
                    icon: const Icon(Icons.send), label: Text('Envoyer relevé ${_heureActuelle}h')),
                ])))
                else Card(color: Colors.green.shade50, child: Padding(padding: const EdgeInsets.all(12),
                  child: Row(children: [const Icon(Icons.check_circle, color: Colors.green), const SizedBox(width: 8),
                    Text('Relevé ${_heureActuelle}h déjà transmis', style: const TextStyle(color: Colors.green, fontWeight: FontWeight.bold))]))),
                const SizedBox(height: 12),
                if (_snapshots.isNotEmpty) Card(child: Padding(padding: const EdgeInsets.all(12), child: Column(crossAxisAlignment: CrossAxisAlignment.start, children: [
                  const Text('Historique', style: TextStyle(fontWeight: FontWeight.bold)),
                  ..._snapshots.map((s) => ListTile(dense: true,
                    leading: Text('${s.heure}h', style: const TextStyle(fontWeight: FontWeight.bold)),
                    title: Text('${s.votants} votants'),
                    trailing: Icon(s.statut == 'valide' ? Icons.check_circle : s.statut == 'rejete' ? Icons.cancel : Icons.schedule,
                      color: s.statut == 'valide' ? Colors.green : s.statut == 'rejete' ? Colors.red : Colors.orange))),
                ]))),
              ]));
            }

            Widget _tabPv() {
              if (_pv?.statut == 'valide') return Center(child: Column(mainAxisAlignment: MainAxisAlignment.center, children: [
                const Icon(Icons.verified, color: Colors.green, size: 64),
                const SizedBox(height: 12),
                const Text('PV Validé ✅', style: TextStyle(fontSize: 20, fontWeight: FontWeight.bold, color: Colors.green)),
                Text('Candidat A: ${_pv!.pctA.toStringAsFixed(1)}% | Candidat B: ${_pv!.pctB.toStringAsFixed(1)}%'),
              ]));
              final cV = TextEditingController(text: _pv?.votants.toString() ?? '');
              final cN = TextEditingController(text: _pv?.nuls.toString() ?? '');
              final cA = TextEditingController(text: _pv?.voixA.toString() ?? '');
              final cB = TextEditingController(text: _pv?.voixB.toString() ?? '');
              return SingleChildScrollView(padding: const EdgeInsets.all(16), child: Column(children: [
                if (_pv?.statut == 'rejete') Card(color: Colors.red.shade50, child: Padding(padding: const EdgeInsets.all(12),
                  child: Text('❌ Rejeté: ${_pv!.noteRejet ?? ""}', style: const TextStyle(color: Colors.red)))),
                Card(child: Padding(padding: const EdgeInsets.all(16), child: Column(children: [
