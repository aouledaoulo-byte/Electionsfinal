              await Future.delayed(const Duration(milliseconds: 800));
              if (!mounted) return;
              final session = Supabase.instance.client.auth.currentSession;
              if (session != null) {
                final role = await AuthService().getUserRole();
                if (!mounted) return;
                if (role == 'agent') {
