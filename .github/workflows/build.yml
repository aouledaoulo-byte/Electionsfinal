content = """import 'package:flutter/material.dart';
import '../services/services.dart';
import 'agent/agent_home.dart';
import 'superviseur/superviseur_home.dart';
import '../utils/constants.dart';

class LoginScreen extends StatefulWidget {
  const LoginScreen({super.key});
  @override State<LoginScreen> createState() => _LoginScreenState();
}
class _LoginScreenState extends State<LoginScreen> {
  final _ctrl = TextEditingController();
  bool _loading = false;
  String? _error;

  Future<void> _login() async {
    final code = _ctrl.text.trim().toUpperCase();
    if (code.isEmpty) return;
    setState(() { _loading = true; _error = null; });
    try {
      final auth = AuthService();
      final user = await auth.loginWithCode(code);
      if (!mounted) return;
      if (user == null) {
        setState(() { _error = 'Code invalide ou agent inactif'; _loading = false; });
        return;
      }
      Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) =>
        user.role == AppRoles.agent ? const AgentHome() : const SuperviseurHome()));
    } catch (e) {
      setState(() { _error = e.toString(); _loading = false; });
    }
  }

  @override Widget build(BuildContext context) {
    return Scaffold(
      backgroundColor: const Color(0xFF1B5E20),
      body: SafeArea(child: Center(child: SingleChildScrollView(
        padding: const EdgeInsets.all(32),
        child: Column(mainAxisAlignment: MainAxisAlignment.center, children: [
          const Icon(Icons.how_to_vote, size: 80, color: Colors.white),
          const SizedBox(height: 16),
          const Text('ELECTION 2026', style: TextStyle(color: Colors.white, fontSize: 28, fontWeight: FontWeight.bold)),
          const SizedBox(height: 8),
          const Text('DJIBOUTI', style: TextStyle(color: Colors.white70, fontSize: 16, letterSpacing: 4)),
          const SizedBox(height: 48),
          Card(shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(16)), child: Padding(
            padding: const EdgeInsets.all(24),
            child: Column(children: [
              const Text('Connexion', style: TextStyle(fontSize: 20, fontWeight: FontWeight.bold)),
              const SizedBox(height: 20),
              TextField(
                controller: _ctrl,
                textCapitalization: TextCapitalization.characters,
                decoration: InputDecoration(
                  labelText: 'Code agent / superviseur', prefixIcon: const Icon(Icons.badge),
                  border: OutlineInputBorder(borderRadius: BorderRadius.circular(10)),
                  errorText: _error),
                onSubmitted: (_) => _login()),
              const SizedBox(height: 16),
              _loading ? const CircularProgressIndicator()
                : ElevatedButton.icon(
                    style: ElevatedButton.styleFrom(backgroundColor: const Color(0xFF1B5E20),
                      foregroundColor: Colors.white, minimumSize: const Size(double.infinity, 50),
                      shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(10))),
                    onPressed: _login, icon: const Icon(Icons.login),
                    label: const Text('Se connecter', style: TextStyle(fontSize: 16))),
            ]),
          )),
        ]),
      ))),
    );
  }
}
"""
