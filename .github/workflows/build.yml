name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create full Flutter project from scratch
        run: |
          # Créer dans /tmp pour avoir les vrais fichiers Gradle propres
          cd /tmp
          flutter create --org com.ynet --project-name election election_tmp
          cd $GITHUB_WORKSPACE
          
          # Copier les fichiers Android/Gradle propres
          cp -r /tmp/election_tmp/android ./
          
          # Préparer les dossiers lib
          mkdir -p lib/models lib/services lib/utils
          mkdir -p lib/screens/agent lib/screens/superviseur
          mkdir -p assets/images
          echo '// placeholder' > lib/main.dart
          
          # Créer constants.dart
          cat > lib/utils/constants.dart << 'CEOF'
