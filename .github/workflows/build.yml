      - name: Get Flutter dependencies
        run: |
          flutter pub get
          

      - name: Build APK
        run: |
          flutter build apk --release --no-shrink
          

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 'election-apk'
          path: 'build/app/outputs/flutter-apk/app-release.apk'
